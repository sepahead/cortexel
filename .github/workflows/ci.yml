name: CI

# Runs only on direct pushes/PRs to this standalone mirror. No scheduled jobs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the build needs only read access to the checkout.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The generated contract must be fresh and deterministic, and the evidence ledger must
  # be structurally sound — a forged PASS or a drifted generated file fails here.
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Generated files are fresh and generation is deterministic
        run: bun run check:generated
      - name: Evidence ledger is structurally valid (no forged PASS)
        run: bun run check:ledger

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun run audit
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Validate package metadata
        run: bun run lint:package
      # dist/ is committed (git-dependency consumers install without a build
      # step), so guard that the committed artifacts + manifest are in sync with
      # source. A stale dist fails here instead of silently shipping old code.
      - name: Verify committed dist is fresh
        run: test -z "$(git status --porcelain --untracked-files=all -- dist)" || (git status --short -- dist && echo "::error::dist/ is stale — run 'bun run build' and commit dist/." && exit 1)

  # The proof checks only the saturating natural-number core. TypeScript property and
  # parity tests in `check` separately establish correspondence with carrier planning.
  formal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          auto-config: false
          use-github-cache: false
      - name: Prove returned-row saturation laws
        run: lean formal/WeightRowSaturation.lean

  # The independent Python reader must pass its own suite. Cross-language digest parity is
  # asserted by the TypeScript suite (test/crossLanguageParity.test.ts) in `check`.
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.16
          enable-cache: false
      - name: Compile Python reader
        run: python -m compileall -q python/src python/tests scripts/smoke-python-package.py
      - name: Python tests (pure standard library)
        run: python -m unittest discover -s python/tests -v
      - name: Strict Python typing
        run: uvx --no-config --from mypy==1.19.1 mypy --config-file python/pyproject.toml python/src/cortexel
      - name: Python lint
        run: uvx --no-config --from ruff==0.15.18 ruff check python/src python/tests scripts/smoke-python-package.py
      - name: Reproducible wheel/sdist and clean-install smoke
        if: matrix.python == '3.14'
        run: python scripts/smoke-python-package.py

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test:package
