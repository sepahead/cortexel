name: CI

# Runs only on direct pushes/PRs to this standalone mirror. No scheduled jobs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the build needs only read access to the checkout.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile || bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
