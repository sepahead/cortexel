name: CI

# Runs only on direct pushes/PRs to this standalone mirror. No scheduled jobs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the build needs only read access to the checkout.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun run audit
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Validate package metadata
        run: bun run lint:package
      # dist/ is committed (git-dependency consumers install without a build
      # step), so guard that the committed artifacts + manifest are in sync with
      # source. A stale dist fails here instead of silently shipping old code.
      - name: Verify committed dist is fresh
        run: test -z "$(git status --porcelain --untracked-files=all -- dist)" || (git status --short -- dist && echo "::error::dist/ is stale — run 'bun run build' and commit dist/." && exit 1)

  package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test:package
