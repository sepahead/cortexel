name: Bug report
description: Report a defect in Cortexel
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, including the scene and VizSpec involved.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a VizSpec JSON that triggers it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Cortexel version
    validations:
      required: false
  - type: checkboxes
    id: honesty
    attributes:
      label: Honesty boundary
      options:
        - label: This bug could let synthetic/advisory data render without its disclosure caption
